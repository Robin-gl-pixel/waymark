name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Typecheck + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Typecheck (root)
        run: npx tsc --noEmit

      - name: Typecheck (functions)
        run: npx tsc --noEmit
        working-directory: functions

      - name: Tests (root)
        run: npx jest --silent

      - name: Tests (functions)
        run: npm test
        working-directory: functions

  e2e:
    name: Maestro E2E (iOS sim)
    # Only on push to main — macOS runners are ~10x the price of ubuntu.
    # A slow but authoritative gate before the main branch takes new code.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # macos-15 runner ships Xcode 16.x, which RN 0.81.5 requires (macos-14 has 15.4)
    runs-on: macos-15
    timeout-minutes: 60
    needs: test

    env:
      SIM_NAME: iPhone-17-Pro-CI
      SIM_DEVICE_TYPE: com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro
      SIM_RUNTIME: com.apple.CoreSimulator.SimRuntime.iOS-26-4
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install root dependencies
        run: npm ci

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app || true
          xcodebuild -version

      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Write .env for the build
        run: |
          cat > .env <<EOF
          EXPO_PUBLIC_FIREBASE_API_KEY=$EXPO_PUBLIC_FIREBASE_API_KEY
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=$EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=$EXPO_PUBLIC_FIREBASE_PROJECT_ID
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=$EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          EXPO_PUBLIC_FIREBASE_APP_ID=$EXPO_PUBLIC_FIREBASE_APP_ID
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=$EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID
          EOF

      - name: Boot simulator
        id: sim
        run: |
          # Find an available iPhone runtime + device type. Fallback if the pinned
          # SIM_RUNTIME isn't available on the runner image.
          RUNTIME=$(xcrun simctl list runtimes ios available | grep -oE 'com\.apple\.CoreSimulator\.SimRuntime\.iOS-[0-9]+-[0-9]+' | tail -1)
          DEVICE_TYPE=$(xcrun simctl list devicetypes | grep -oE 'com\.apple\.CoreSimulator\.SimDeviceType\.iPhone-[0-9]+[^ ,)]*' | head -1)
          echo "Using runtime=$RUNTIME device_type=$DEVICE_TYPE"
          SIM_ID=$(xcrun simctl create "$SIM_NAME" "$DEVICE_TYPE" "$RUNTIME")
          echo "sim_id=$SIM_ID" >> $GITHUB_OUTPUT
          xcrun simctl boot "$SIM_ID"
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Prebuild ios/ (Expo generates the native project on demand)
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods deps
        run: pod install
        working-directory: ios

      - name: Build iOS Debug for simulator
        run: |
          xcodebuild \
            -workspace Waymark.xcworkspace \
            -scheme Waymark \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.sim_id }}" \
            -derivedDataPath build \
            -quiet \
            build
        working-directory: ios

      - name: Install app on sim + seed media
        run: |
          xcrun simctl install ${{ steps.sim.outputs.sim_id }} ios/build/Build/Products/Debug-iphonesimulator/Waymark.app
          xcrun simctl addmedia ${{ steps.sim.outputs.sim_id }} screenshots-examples/scr1.png

      - name: Run Maestro tests
        run: maestro test .maestro/00_smoke.yaml .maestro/10_golden_path.yaml

      - name: Upload Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts
          path: ~/.maestro/tests/
          retention-days: 7
