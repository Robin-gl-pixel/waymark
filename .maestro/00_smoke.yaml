# Smoke test — the app launches and the auth screen renders.
# Gate before running the longer flows: fails fast if the last build/patch
# broke basic startup.
appId: com.robinhesse.waymark
name: Smoke — app launches to auth
---
- launchApp:
    clearState: true
# First launch waits for Metro to serve the JS bundle (~10s cold on CI).
- extendedWaitUntil:
    visible: "Waymark"
    timeout: 60000
# "Continue with Apple" only renders when the sim has an iCloud session — CI has none.
- assertVisible: "Skip .dev anonymous sign-in."
