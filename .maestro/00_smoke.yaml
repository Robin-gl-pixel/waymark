# Smoke test — the app launches and the auth screen renders.
# Gate before running the longer flows: fails fast if the last build/patch
# broke basic startup.
appId: com.robinhesse.waymark
name: Smoke — app launches to auth
---
- launchApp:
    clearState: true
# Wait for the Skip button — it only renders once the JS bundle is loaded and
# React has mounted AuthScreen. CI's cold Metro bundle can take >60s.
- extendedWaitUntil:
    visible: "Skip .dev anonymous sign-in."
    timeout: 180000
