<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pinti app icon — v12 § 01 (Hero vermillon)
  Source master, 1:1 with the app's design system (src/theme/index.ts).

  Contents:
  - Papier ground #F7EFDA (from theme + color palette.png)
  - Fine grid (rgba encre 0.08) — atlas quadrillé signal
  - Diagonal band (rgba encre 0.11) — la Seine / boulevard suggéré
  - 6 pins with hero vermillon at center-top (matches accent CTA #E5253C)
  - Contours ink #14100A 1.5px, per CategoryPin.tsx canonical stroke

  To render as 1024x1024 PNG (iOS icon requirement):
    brew install librsvg
    rsvg-convert -w 1024 -h 1024 assets/pinti-icon.svg -o assets/icon.png
  Or open in Preview.app → Export → PNG at 1024x1024.
-->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <defs>
    <pattern id="grid" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="rgba(20,16,10,0.08)" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Papier ground -->
  <rect width="100" height="100" fill="#F7EFDA"/>

  <!-- Grille fine -->
  <rect width="100" height="100" fill="url(#grid)"/>

  <!-- Bande diagonale — la Seine / grand boulevard -->
  <path d="M 0 62 L 100 42 L 100 50 L 0 70 Z" fill="rgba(20,16,10,0.11)"/>

  <!-- Pins (5 satellites + 1 hero vermillon) -->
  <circle cx="22" cy="24" r="4.5" fill="#002FA7" stroke="#14100A" stroke-width="1.4"/>
  <circle cx="72" cy="20" r="4.5" fill="#98C43B" stroke="#14100A" stroke-width="1.4"/>
  <circle cx="46" cy="34" r="9"   fill="#E5253C" stroke="#14100A" stroke-width="1.8"/>
  <circle cx="80" cy="42" r="4.5" fill="#F5A623" stroke="#14100A" stroke-width="1.4"/>
  <circle cx="28" cy="80" r="4.5" fill="#B93E9C" stroke="#14100A" stroke-width="1.4"/>
  <circle cx="66" cy="84" r="4.5" fill="#FF8A63" stroke="#14100A" stroke-width="1.4"/>
</svg>
